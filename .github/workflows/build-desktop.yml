name: Build desktop apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: wasm32-unknown-unknown,aarch64-apple-darwin
            artifact-name: macos-aarch64
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles deb
            rust-targets: wasm32-unknown-unknown
            artifact-name: linux-x86_64
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis
            rust-targets: wasm32-unknown-unknown
            artifact-name: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binaryen \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            rpm

      - name: Install wasm-opt (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install binaryen

      - name: Stub wasm-opt (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          "@exit /b 0" | Out-File -FilePath "$env:RUNNER_TEMP\wasm-opt.bat" -Encoding ascii
          echo "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          cache-on-failure: true

      - name: Cache Cargo CLI tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri*
            ~/.cargo/bin/dx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-tauri-v2-dioxus-v0.7

      - name: Install Tauri and Dioxus CLIs
        run: |
          cargo install tauri-cli --version "^2.0" --locked
          cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tauriScript: cargo tauri
          args: ${{ matrix.args }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*
            target/release/bundle/**/*
            target/*/release/bundle/**/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*-setup.exe
          generate_release_notes: true
