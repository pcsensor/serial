name: Build desktop apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "app-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: wasm32-unknown-unknown,aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: wasm32-unknown-unknown,x86_64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust-targets: wasm32-unknown-unknown
          - name: Windows x64
            platform: windows-latest
            args: ""
            rust-targets: wasm32-unknown-unknown

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            rpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          cache-on-failure: true

      - name: Cache Cargo CLI tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri*
            ~/.cargo/bin/dx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-tauri-v2-dioxus-v0.7

      - name: Install Tauri and Dioxus CLIs
        run: |
          cargo install tauri-cli --version "^2.0" --locked
          cargo install dioxus-cli --version "^0.7" --locked

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[platform]-[arch]-[bundle]"
